<script>
const stampsRow = document.getElementById('stamps-row');
const slider = document.getElementById('stamp-slider');
const label = document.getElementById('stamp-count-label');

function renderStamps(count){
  stampsRow.innerHTML = '';
  for(let i=0;i<5;i++){
    const filled = i < count;
    const dot = document.createElement('div');
    dot.style.cssText = 'width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;' +
      (filled ? 'background:#896F5D;' : 'background:transparent;border:1.5px solid rgba(255,255,255,0.35);');
    dot.innerHTML = filled ? '<i class="ti ti-coffee" style="font-size:15px;color:#F7F4F2;" aria-hidden="true"></i>' : '';
    stampsRow.appendChild(dot);
  }
  label.textContent = count + ' / 5';
}
renderStamps(3);
slider.addEventListener('input', (e)=>{ renderStamps(parseInt(e.target.value)); });
</script>
